name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build-release:
    name: Build Release Binary
    runs-on: macos-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (arm64)
        run: GOARCH=arm64 GOOS=darwin go build -ldflags="-s -w" -o ldcron-darwin-arm64 .

      - name: Build (amd64)
        run: GOARCH=amd64 GOOS=darwin go build -ldflags="-s -w" -o ldcron-darwin-amd64 .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ldcron-binaries
          path: ldcron-darwin-*
