name: Release

on:
  push:
    tags:
      - 'v*'
  # GITHUB_TOKEN で push されたタグはワークフローをトリガーしないため、
  # auto-release.yml 完了後にも発火させる
  workflow_run:
    workflows: ["Auto Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            TAG=$(git describe --tags --abbrev=0)
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Build (arm64)
        run: |
          GOARCH=arm64 GOOS=darwin go build -ldflags="-s -w -X github.com/s4na/ldcron/cmd.version=${{ steps.version.outputs.tag }}" \
            -o ldcron-darwin-arm64 .
          tar czf ldcron-darwin-arm64.tar.gz ldcron-darwin-arm64
          shasum -a 256 ldcron-darwin-arm64.tar.gz > ldcron-darwin-arm64.tar.gz.sha256

      - name: Build (amd64)
        run: |
          GOARCH=amd64 GOOS=darwin go build -ldflags="-s -w -X github.com/s4na/ldcron/cmd.version=${{ steps.version.outputs.tag }}" \
            -o ldcron-darwin-amd64 .
          tar czf ldcron-darwin-amd64.tar.gz ldcron-darwin-amd64
          shasum -a 256 ldcron-darwin-amd64.tar.gz > ldcron-darwin-amd64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ldcron-darwin-arm64.tar.gz
            ldcron-darwin-arm64.tar.gz.sha256
            ldcron-darwin-amd64.tar.gz
            ldcron-darwin-amd64.tar.gz.sha256
          generate_release_notes: true

      - name: Update Homebrew formula
        run: |
          ARM64_SHA256=$(awk '{print $1}' ldcron-darwin-arm64.tar.gz.sha256)
          AMD64_SHA256=$(awk '{print $1}' ldcron-darwin-amd64.tar.gz.sha256)
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"

          if [[ -z "${ARM64_SHA256}" || -z "${AMD64_SHA256}" ]]; then
            echo "ERROR: SHA256 values are empty" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # タグ checkout によるデタッチド HEAD から main ブランチへ切り替える
          git fetch origin main
          git checkout main

          # トップレベルの on_arm do / on_intel do ブロック（2スペースインデント）のみを対象とする
          # def install 内のネストされたブロック（4スペースインデント）は変更しない
          sed -i '' "s/  version \"[^\"]*\"/  version \"${VERSION}\"/" Formula/ldcron.rb
          sed -i '' "/^  on_arm do/,/^  end/{s/sha256 \"[^\"]*\"/sha256 \"${ARM64_SHA256}\"/;}" Formula/ldcron.rb
          sed -i '' "/^  on_intel do/,/^  end/{s/sha256 \"[^\"]*\"/sha256 \"${AMD64_SHA256}\"/;}" Formula/ldcron.rb

          git add Formula/ldcron.rb
          # [skip ci] により auto-release.yml の二重発火を防ぐ
          # （actor チェックでも防止されるが明示的に付与する）
          git commit -m "chore: update Homebrew formula to ${TAG} [skip ci]"
          # auto-release.yml の patch バンプと競合する可能性があるためリベースしてから push する
          git pull --rebase origin main
          git push origin main
